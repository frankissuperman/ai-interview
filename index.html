<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 面试助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .setup {
            padding: 20px 30px;
            border-bottom: 1px solid #eee;
        }
        .setup select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 14px;
        }
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f9f9f9;
        }
        .message {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            max-width: 80%;
        }
        .message.ai { background: white; border: 1px solid #eee; margin-right: auto; }
        .message.user { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin-left: auto; }
        .input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 25px;
            font-size: 14px;
        }
        .input-area input:focus { outline: none; border-color: #667eea; }
        .input-area button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI 面试助手</h1>
            <p>模拟真实面试，提升你的面试技巧</p>
        </div>
        
        <div class="setup">
            <select id="role">
                <option value="产品经理">产品经理</option>
                <option value="AI产品经理">AI产品经理</option>
                <option value="数字化转型">数字化转型专家</option>
                <option value="运营经理">运营经理</option>
            </select>
            <button onclick="startChat()" style="width:100%;margin-top:10px;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:bold;">开始面试</button>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="message ai">
                👋 你好！我是你的AI面试官。<br><br>请选择岗位，点击"开始面试"。
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的回答..." onkeypress="handleKeyPress(event)" />
            <button onclick="sendMessage()" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        let role = "产品经理";
        
        function startChat() {
            role = document.getElementById("role").value;
            var chatArea = document.getElementById("chatArea");
            chatArea.innerHTML = "<div class='message ai'>🎯 好的，现在开始" + role + "面试！<br><br>请介绍一下你自己，以及为什么想从事这个岗位？</div>";
        }
        
        async function sendMessage() {
            var input = document.getElementById("userInput");
            var message = input.value.trim();
            var sendBtn = document.getElementById("sendBtn");
            
            if (!message) return;
            
            addMessage(message, "user");
            input.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "思考中...";
            
            try {
                var response = await fetch("http://localhost:5000/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message, role: role })
                });
                
                var data = await response.json();
                addMessage(data.reply, "ai");
            } catch (error) {
                addMessage("❌ 连接失败: " + error.message, "ai");
            }
            
            sendBtn.disabled = false;
            sendBtn.textContent = "发送";
        }
        
        function addMessage(text, type) {
            var chatArea = document.getElementById("chatArea");
            var div = document.createElement("div");
            div.className = "message " + type;
            div.innerHTML = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function handleKeyPress(event) {
            if (event.key === "Enter") sendMessage();
        }
    </script>
</body>
</html>
